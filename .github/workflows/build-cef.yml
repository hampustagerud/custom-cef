name: Build Custom CEF

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      cef_branch:
        description: 'CEF branch (e.g. 6533, 6478)'
        required: false
        default: '7680'

jobs:
  build-linux:
    name: Build CEF (Linux)
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Configure swap
        run: |
          sudo swapoff -a
          sudo rm -f /swapfile
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            ninja-build \
            pkg-config \
            python3 \
            python3-pip \
            curl \
            lsb-release \
            libglib2.0-dev \
            libgtk-3-dev \
            libdbus-1-dev \
            libxi-dev \
            libxtst-dev \
            libxrandr-dev \
            libcups2-dev \
            libpulse-dev \
            libasound2-dev \
            libcap-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            clang-format \
            gperf \
            bison \
            flex \
            libpci-dev \
            libnss3-dev \
            libnspr4-dev \
            libxkbcommon-dev \
            libdrm-dev \
            libgbm-dev \
            mesa-common-dev

      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git ~/depot_tools
          echo "$HOME/depot_tools" >> $GITHUB_PATH

      - name: Download automate-git.py
        run: |
          curl -fsSL \
            "https://bitbucket.org/chromiumembedded/cef/raw/master/tools/automate/automate-git.py" \
            -o ~/automate-git.py

      - name: Record build start time
        id: timer
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Run automate-git.py
        run: |
          mkdir -p ~/cef_build
          cd ~/cef_build
          python3 ~/automate-git.py \
            --download-dir="$HOME/cef_build/chromium" \
            --branch=${{ inputs.cef_branch || '7680' }} \
            --depot-tools-dir="$HOME/depot_tools" \
            --x64-build \
            --no-chromium-history \
            --build-target=cefsimple \
            --no-debug-build \
            --force-build \
            --force-distrib \
            --minimal-distrib \
            --client-distrib \
            --distrib-subdir="dist"
        env:
          CEF_USE_GN: 1
          GN_DEFINES: >-
            use_sysroot=true
            is_official_build=true
            chrome_pgo_phase=0
            is_component_build=false
            symbol_level=0
            blink_symbol_level=0
            v8_symbol_level=0
            exclude_unwind_tables=true

      - name: Record build end time and report
        if: always()
        run: |
          end=$(date +%s)
          start=${{ steps.timer.outputs.start }}
          elapsed=$(( end - start ))
          minutes=$(( elapsed / 60 ))
          seconds=$(( elapsed % 60 ))
          echo "## Build timing" >> $GITHUB_STEP_SUMMARY
          echo "Build duration: ${minutes}m ${seconds}s" >> $GITHUB_STEP_SUMMARY

      - name: Measure binary sizes
        if: success()
        run: |
          DIST_DIR="$HOME/cef_build/chromium/chromium/src/cef/binary_distrib"
          echo "## Artifact sizes" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find "$DIST_DIR" -name "*.tar.bz2" -o -name "*.zip" | while read f; do
            echo "$(du -sh "$f" | cut -f1)  $(basename "$f")"
          done >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo "Disk usage after build:" >> $GITHUB_STEP_SUMMARY
          df -h / >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload CEF distribution
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cef-linux-x64-stripped
          path: ~/cef_build/chromium/chromium/src/cef/binary_distrib/
          retention-days: 7
